name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Python
        run: uv python install 3.11

      - name: Sync and test
        run: |
          uv sync --python 3.11 --extra dev
          uv run pytest tests/ -q
